{% extends "global/Page.html" %}
{% block content %}
    <div style="text-align: center; margin-top: 50px;">
        <h1>Your Report is Ready</h1>
        <p>You can download your personalized report below.</p>
        
        <!-- Display the PDF file inside an iframe -->
        <iframe 
            src="{{ pdf_url }}" 
            width="80%" 
            height="600px"
            style="border: 1px solid #ccc;">
        </iframe>
        
        <!-- Download and Next Buttons in a container div -->
        <div style="margin-top: 20px; display: flex; justify-content: center; gap: 15px;">
            <a href="{{ pdf_url }}" download class="btn btn-primary">
                Download Your Report
            </a>
            
            <!-- Prolific next button -->
            <button type="submit" style="display: inline-block;" class="btn btn-primary">Next</button>
        </div>
    </div>
{% endblock %}
