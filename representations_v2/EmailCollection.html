{% extends "global/Page.html" %}
{% block content %}
<div class="container">

<form id="emailForm" method="post">
    <div class="question">
        <p>{{ form.email.label }}</p>
        <p class="instructions">Your email is required to participate in the gift card draw.</p>
        <input type="email" name="email" class="form-control" id="id_email" required>
        <span class="error-message" style="color: red; display: none;"></span>
        <button type="End Survey" class="btn btn-primary">Submit</button>
    </div>
</form>
</div>
{% endblock %}

{% block style %}
<style>
    html, body {
        height: 100vh; /* Ensure full height */
        margin: 0; /* Remove default margin */
    }
    
    .container {
        justify-content: center; /* Vertically center content */
        align-items: center; /* Horizontally center content */
        min-height: 100%;
        text-align: left;
        font-size: 18px;
    }
    
    .container .btn-primary {
        margin-top: 20px; /* Adjust the value to your preference */
        width: auto; 
        align-self: flex-start;
    }
    
    .container > * { /* Target all direct children of .container */
        width: 100%; /* Make children take up full width */
        text-align: left; /* Align text to the left within each child */
    }
    
    .form-control {
        width: 50%; /* Make input fields take up 50% width */
        height: 40px; /* Adjust the height as needed */
        font-size: 16px; /* Adjust font size for better readability */
    }
    
    .instructions {
        font-style: italic;
        font-size: 16px;
        color: #555;
        margin-bottom: 15px;
    }
</style>
{% endblock %}

{% block script %}
<script>
document.addEventListener('DOMContentLoaded', (event) => {
    document.getElementById("emailForm").addEventListener("submit", validateEmail);
});

function validateEmail(event) {
    var email = document.getElementById("id_email").value;
    var errorMessage = document.querySelector(".error-message");

    // Clear any previous error message
    errorMessage.style.display = "none";
    
    // Basic email validation
    if (email.trim() === "") {
        errorMessage.textContent = "Please enter your email address.";
        errorMessage.style.display = "block";
        event.preventDefault(); // Prevent form submission
        return;
    }
    
    // Validate email format
    var re = /\S+@\S+\.\S+/;
    if (!re.test(email)) {
        errorMessage.textContent = "Please enter a valid email address.";
        errorMessage.style.display = "block";
        event.preventDefault(); // Prevent form submission
    }
}
</script>
{% endblock %}
