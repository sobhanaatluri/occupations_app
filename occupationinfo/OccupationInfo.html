{% extends "global/Page.html" %}
{% block content %}
<div class="container">

<form id="questionsForm" method="post">

    <div id="question1" class="question">
        <p>{{ form.num_years.label }}</p>
        {{ form.num_years }}
        <span class="error-message" style="color: red; display: none;"></span>
        <button type="button" onclick="showNextQuestion(1)" class="btn btn-primary">Next</button>
    </div>
    <div id="question2" class="question" style="display: none;">
        <p>{{ form.skills.label }}</p>
        <textarea name="skills" class="form-control form-control-textarea" id="id_skills" required></textarea>
        <span class="error-message" style="color: red; display: none;"></span>
        <button type="button" onclick="showNextQuestion(2)" class="btn btn-primary">Next</button>
    </div>
    <div id="question3" class="question" style="display: none;">
        <p>{{ form.tasks.label }}</p>
        <textarea name="tasks" class="form-control form-control-textarea" id="id_tasks" required oninvalid="this.setCustomValidity('Please describe the tasks in your job.')" 
    oninput="this.setCustomValidity('')"></textarea>
    <button type="submit" style="display: inline-block;" class="btn btn-primary">Next</button>
    </div>
</form>
    </div>
{% endblock %}

{% block style %}
<style>
    
    html, body {
        height: 100vh; /* Ensure full height */
        margin: 0; /* Remove default margin */
        }
    
    .container {
        /*display: flex;
        flex-direction: column; /* Align children vertically */
        justify-content: center; /* Vertically center content */
        align-items: center; /* Horizontally center content */
        min-height: 100%;
        text-align: left;
        font-size: 18px;
    }
    
    .container .btn-primary {
        margin-top: 20px; /* Adjust the value to your preference */
        width: auto; 
        align-self: flex-start;
    }
    
    .container > * { /* Target all direct children of .container */
        width: 100%; /* Make children take up full width */
        text-align: left; /* Align text to the left within each child */
    }
    
    .custom-textbox {
    width: 300px; /* Adjust the width as needed */
    height: 40px; /* Adjust the height as needed */
    font-size: 16px; /* Adjust the font size as needed */
}
    
    .form-control-textarea {
        height: 6em; /* Adjust based on your font size and line height */
        width: 50%;
        /* Additional styling if needed */
    }
</style>
{% endblock %}

{% block script %}
<script>
    
document.addEventListener('DOMContentLoaded', (event) => {
    document.getElementById("questionsForm").addEventListener("submit", validateTasks);
});

function showNextQuestion(currentQuestionNumber) {
    var currentQuestionId = "question" + currentQuestionNumber;
    var currentQuestion = document.getElementById(currentQuestionId);
    var errorMessage = currentQuestion.querySelector(".error-message"); // Select the error message span

    // Clear any previous error message
    errorMessage.style.display = "none";
    
    // Define custom error messages for each field
    if (currentQuestionNumber === 1) {
        customErrorMessage = "Please enter the number of years.";
    } else if (currentQuestionNumber === 2) {
        customErrorMessage = "Please describe the skills required for your role.";
    } else if (currentQuestionNumber === 3) {
        customErrorMessage = "Please describe the tasks in your job.";
    }

    // Validate input
    var inputValid = false;
    var inputField = currentQuestion.querySelector("input, textarea"); // Select the input or textarea within the current question

    if (inputField && inputField.value.trim() === "") {
        // If the input is empty, display an error message and stop the function
        errorMessage.textContent = customErrorMessage; // Customize your error message
        errorMessage.style.display = "block"; // Show the error message
    } else {
        inputValid = true; // Mark input as valid
    }

    if (!inputValid) return; // Stop if input is not valid

    // Hide the current question and show the next one, or the submit button
    currentQuestion.style.display = "none";
    var nextQuestionNumber = currentQuestionNumber + 1;
    var nextQuestionId = "question" + nextQuestionNumber;
    var nextQuestion = document.getElementById(nextQuestionId);

    if (nextQuestion) {
        nextQuestion.style.display = "block";
    } else {
        document.querySelector("#questionsForm button[type='submit']").style.display = "inline-block";
    }
}

function validateTasks(event) {
    var tasksInput = document.getElementById("id_tasks");
    var errorMessage = document.querySelector("#question3 .error-message");

    // Clear any previous error message
    errorMessage.style.display = "none";
    errorMessage.textContent = "";

    if (!tasksInput.value.trim()) {
        // If the "tasks" field is empty, show the error message
        errorMessage.textContent = "Please describe the tasks in your job.";
        errorMessage.style.display = "block";
        event.preventDefault(); // Prevent form submission
    }
}

</script>
{% endblock %}
